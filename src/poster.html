<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Sede Te Acompaña – UCR</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>

  <div class="poster">

    <div class="titulo-wrap">
      <div class="exclamacion izq">¡</div>
      <div class="titulo-bloque">
        <div class="linea-1">
          <span class="badge morado">LA SEDE</span>
        </div>
        <div class="linea-2">
          <span class="badge azul">TE</span>
          <span class="texto-acompana">ACOMPAÑA</span>
        </div>
      </div>
      <div class="exclamacion der">!</div>
    </div>

    <div class="subtitulo">
      <p class="linea-respeto">El respeto no se negocia</p>
      <p class="linea-para">¡Pará ya de acosar!</p>
    </div>

    <div class="qr-wrap">
      <p class="qr-texto">Si necesitás ayuda,<br>escaneá este QR:</p>
      <img class="qr-img" src="qr.png" alt="Código QR de ayuda">
    </div>

    <div class="imagen-wrap">
      <img src="poster.png" alt="qr" class="foto">
    </div>

    <div class="footer">
      <div class="logo-ucr">UCR</div>
      <div class="separador"></div>
      <div class="logo-libre">
        <span class="libre-titulo">UCR</span>
        <span class="libre-sub">LIBRE DE<br>ACOSO<br>SEXUAL</span>
      </div>
      <div class="separador"></div>
      <div class="logo-sede">
        <span class="sg">SG</span>
        <span class="sede-texto">Sede de<br>Guanacasta</span>
      </div>
    </div>

  </div>

  <a href="index.html" class="btn-volver">← Volver</a>

</body>
</html>
